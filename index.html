<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美团生态 × 腾讯渠道素材专用看板</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--ink:#1f2328;--muted:#6b7178;--line:#e8e8ea;--gold:#b08d3e;--accent:#1a1a1a}
  body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;color:#1f2328;background:#f4f4f5;line-height:1.7;font-size:15px;-webkit-font-smoothing:antialiased}
  .layout{display:flex;min-height:100vh;max-width:1280px;margin:0 auto;background:#fff}
  /* 侧栏 */
  .side{width:248px;flex:none;background:#fafafa;border-right:1px solid #e8e8ea;padding:24px 0;position:sticky;top:0;height:100vh;overflow-y:auto}
  .side .brand{padding:0 22px 18px;border-bottom:1px solid #eee;margin-bottom:10px}
  .side .brand .t{font-size:16px;font-weight:600;color:#b08d3e}
  .side .brand .s{font-size:21px;font-weight:700;color:#1a1a1a;margin-top:4px;line-height:1.3}
  .navitem{padding:11px 22px;font-size:14px;color:#444;cursor:pointer;border-left:3px solid transparent;display:flex;align-items:center;justify-content:space-between;gap:8px}
  .navitem:hover{background:#f0f0f0}
  .navitem.active{background:#fff;border-left-color:#b08d3e;color:#1a1a1a;font-weight:600}
  .navitem .cnt{font-size:11px;color:#aaa;background:#eee;border-radius:10px;padding:1px 8px}
  .navitem.soon{color:#bbb}
  .navitem.soon .cnt{background:#f3f3f3}
  /* 主区 */
  .main{flex:1;min-width:0;padding:34px 44px 80px}
  .crumb{font-size:13px;color:#9aa0a6;margin-bottom:6px}
  h1{font-size:26px;font-weight:700;color:#1a1a1a}
  .desc{color:#6b7178;font-size:14px;margin-top:8px;margin-bottom:22px}
  .catbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:26px;border-bottom:1px solid #eee;padding-bottom:16px}
  .catchip{padding:7px 16px;border:1px solid #e2e2e4;border-radius:20px;font-size:13px;cursor:pointer;background:#fff;color:#555}
  .catchip:hover{border-color:#b08d3e;color:#1a1a1a}
  .catchip.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
  .catchip.soon{color:#bbb;border-style:dashed}
  .catchip.active.soon{color:#fff}
  h2{font-size:19px;font-weight:700;color:#1a1a1a;margin:30px 0 6px;display:flex;align-items:center;gap:10px}
  h2 .no{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;background:#1a1a1a;color:#fff;border-radius:7px;font-size:13px;flex:none}
  h2 + .lead{color:#6b7178;font-size:13px;margin-bottom:16px}
  h3{font-size:16px;font-weight:600;color:#1a1a1a;margin:22px 0 10px;padding-left:11px;border-left:4px solid #b08d3e}
  table{width:100%;border-collapse:collapse;margin:14px 0;font-size:14px}
  th,td{border:1px solid #e8e8ea;padding:9px 8px;text-align:left;vertical-align:top}
  td:first-child,th:first-child{text-align:center}
  th{background:#f6f6f7;font-weight:600}
  ul{margin:8px 0 8px 20px}li{margin:5px 0}
  .imgcard{margin:14px 0;border:1px solid #e8e8ea;border-radius:12px;overflow:hidden}
  .imgcard img{width:100%;display:block}
  .imgcard .cap{padding:9px 13px;font-size:13px;color:#6b7178;background:#fafafa;border-top:1px solid #f0f0f0}
  .formula{background:#1a1a1a;color:#eee;border-radius:12px;padding:18px 22px;font-size:14px;line-height:1.9;margin:14px 0;font-family:"SF Mono",Consolas,monospace}
  .formula .plus{color:#E7C98B}
  .quote{background:#f6f6f7;border-radius:12px;padding:16px 20px;margin:14px 0;font-size:14px;color:#333}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .casecard{border:1px solid #e8e8ea;border-radius:12px;padding:14px 16px;background:#fff}
  .casecard .src{font-size:12px;color:#9aa0a6;margin-bottom:6px}
  .casecard .q{font-size:14px;color:#1a1a1a;line-height:1.6}
  .mockrow{display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start;margin:16px 0}
  .mockcol{flex:1;min-width:230px}
  .mockcol>.label{font-size:14px;font-weight:600;margin-bottom:9px}
  .mk{border:1px solid #e8e8ea;border-radius:10px;overflow:hidden;font-size:0;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
  .empty{text-align:center;color:#bbb;padding:90px 20px}
  .empty .ic{font-size:38px;font-weight:300;color:#ddd;margin-bottom:14px}
  .empty .h{font-size:17px;color:#888;font-weight:600;margin-bottom:8px}
  .empty .p{font-size:14px;color:#aaa;max-width:420px;margin:0 auto}
  .tagline{display:inline-block;font-size:12px;background:#EEEDFE;color:#534AB7;border-radius:20px;padding:3px 12px;margin-bottom:14px}
  @media(max-width:760px){.layout{flex-direction:column}.side{width:100%;height:auto;position:static;display:flex;flex-wrap:wrap;padding:14px}.side .brand{width:100%}.navitem{border-left:none;border-bottom:2px solid transparent}.navitem.active{border-left:none;border-bottom-color:#b08d3e}.main{padding:24px}.grid2{grid-template-columns:1fr}}
  footer{padding:24px 44px;color:#9aa0a6;font-size:13px;border-top:1px solid #e8e8ea}
  .optbl{width:100%;border-collapse:collapse;font-size:12.5px;margin:14px 0}
  .optbl th,.optbl td{border:1px solid #d6d9dd;padding:7px 8px;text-align:center;vertical-align:middle;line-height:1.55}
  .optbl .hd{background:#1f4e79;color:#fff;font-weight:600;font-size:14px}
  .optbl .hd2{background:#cfe0f1;color:#1f4e79;font-weight:600}
  .optbl .mod{background:#f0f1f3;font-weight:600;width:84px}
  .optbl .sub{background:#fafbfc;width:104px}
  .optbl td.l{text-align:left}
  .optbl .tip{font-weight:600}
  .optbl .red{color:#c00000;font-weight:600}
</style>
</head>
<body>
<div class="layout">
  <nav class="side">
    <div class="brand"><div class="t">美团生态 × 腾讯渠道</div><div class="s">素材专用看板</div></div>
    <div id="nav"></div>
  </nav>
  <main class="main" id="main"></main>
</div>

  if(cat.samples){n++;h+=`<h2><span class="no">${n}</span>素材示例参考</h2><div class="lead">${cat.samples.lead||''}</div>`;cat.samples.items.forEach(it=>{h+=(it.h3?`<h3>${it.h3}</h3>`:'')+`<div class="imgcard"><img src="${it.img}" alt=""><div class="cap">${it.cap}</div></div>`;});}
  if(cat.market){n++;h+=`<h2><span class="no">${n}</span>市面宣传卖点参考</h2><div class="lead">${cat.market.lead||''}</div>`+table(cat.market.head,cat.market.rows);if(cat.market.cases){h+=`<h3>市面宣传示例摘录</h3><div class="grid2">`+cat.market.cases.map(c=>`<div class="casecard"><div class="src">${c.src}</div><div class="q">${c.q}</div></div>`).join('')+`</div>`;}}
  if(cat.formula){n++;h+=`<h2><span class="no">${n}</span>制作公式</h2><div class="formula">${cat.formula.body}</div>`;if(cat.formula.points){h+='<ul>'+cat.formula.points.map(p=>`<li>${p}</li>`).join('')+'</ul>';}}
  if(cat.mockups){n++;h+=`<h2><span class="no">${n}</span>成品参考稿</h2><div class="lead">${cat.mockups.lead||''}</div><div class="mockrow">`;cat.mockups.items.forEach(mk=>{h+=`<div class="mockcol"><div class="label">${mk.label}</div>${mk.html}</div>`;});h+=`</div>`;if(cat.mockups.note)h+=`<div class="quote">${cat.mockups.note}</div>`;}
  if(cat.copy){n++;h+=`<h2><span class="no">${n}</span>文案库</h2>`;cat.copy.forEach(g=>{h+=`<h3>${g.t}</h3><ul>`+g.list.map(x=>`<li>${x}</li>`).join('')+`</ul>`;});}
  if(cat.checklist){n++;h+=`<h2><span class="no">${n}</span>出图核对清单</h2><ul>`+cat.checklist.map(x=>`<li>${x}</li>`).join('')+`</ul>`;}
  b.innerHTML=h;
}
function table(head,rows){
  let h='<table><tr>'+head.map(x=>`<th>${x}</th>`).join('')+'</tr>';
  h+=rows.map(r=>'<tr>'+r.map(c=>`<td>${c}</td>`).join('')+'</tr>').join('');
  return h+'</table>';
}
const state={ind:0,cat:0};
renderNav();renderMain();
</script>
